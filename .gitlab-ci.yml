# Переменные CI/CD (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY — приватный ключ (весь текст BEGIN…END)
#   DEPLOY_HOST     — 72.56.238.74 (или домен)
#   DEPLOY_USER     — deploy

stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - ssh -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "cd /var/www/mystery/Mysterylanding && git fetch origin && git reset --hard origin/main"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
